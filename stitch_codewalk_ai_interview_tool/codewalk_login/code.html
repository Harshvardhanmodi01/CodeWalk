<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Atmospheric Background Shader -->

<!-- Top Navigation (Shell Suprpession Logic: Minimized for Login) -->
<header class="fixed top-0 w-full z-50 flex justify-center py-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-fixed text-4xl" data-icon="terminal">terminal</span>
<span class="font-headline-md text-headline-md font-bold text-primary-fixed tracking-tight">CodeWalk</span>
</div>
</header>
<main class="relative z-10 flex-grow flex items-center justify-center px-margin-mobile">
<!-- Login Card -->
<div class="w-full max-w-[420px] bg-surface-container border border-outline-variant p-8 relative overflow-hidden group">
<!-- Decorative Scanner Line -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-primary-fixed/30 animate-[scan_4s_linear_infinite]"></div>
<div class="space-y-6">
<div class="text-center space-y-1">
<h1 class="font-headline-md text-headline-md text-on-surface">Welcome back</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Identify yourself to continue</p>
</div>
<!-- SSO Actions -->
<div class="grid grid-cols-1 gap-3">
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-high border border-outline-variant py-3 px-4 text-on-surface font-label-sm hover:bg-surface-variant transition-all duration-200 active:scale-[0.98]">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path>
</svg>
<span>Login with GitHub</span>
</button>
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-high border border-outline-variant py-3 px-4 text-on-surface font-label-sm hover:bg-surface-variant transition-all duration-200 active:scale-[0.98]">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Login with Google</span>
</button>
</div>
<div class="flex items-center gap-4 py-2">
<div class="flex-grow h-[1px] bg-outline-variant"></div>
<span class="font-code-sm text-code-sm text-outline">OR</span>
<div class="flex-grow h-[1px] bg-outline-variant"></div>
</div>
<!-- Form -->
<form class="space-y-4" onsubmit="return false">
<div class="space-y-1.5">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]" data-icon="alternate_email">alternate_email</span>
                            EMAIL ADDRESS
                        </label>
<div class="relative glow-focus">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-primary-fixed/50 font-code-md text-code-md select-none">&gt;</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant pl-8 pr-4 py-3 text-on-surface font-code-md focus:outline-none transition-all" placeholder="dev@codewalk.io" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-end">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]" data-icon="key">key</span>
                                PASSWORD
                            </label>
<a class="text-[10px] text-primary-fixed/70 hover:text-primary-fixed font-label-sm uppercase tracking-wider transition-colors" href="#">Forgot Access?</a>
</div>
<div class="relative glow-focus">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-primary-fixed/50 font-code-md text-code-md select-none">&gt;</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant pl-8 pr-4 py-3 text-on-surface font-code-md focus:outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary-fixed text-on-primary-fixed font-label-sm py-4 glow-primary hover:opacity-90 active:scale-[0.97] transition-all flex items-center justify-center gap-2 mt-4 uppercase tracking-widest" type="submit">
<span>Initiate Session</span>
<span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
<div class="pt-2 text-center">
<p class="text-on-surface-variant font-label-sm">
                        New entity? <a class="text-primary-fixed hover:underline" href="#">Register Credentials</a>
</p>
</div>
</div>
</div>
<!-- Floating Data Particles (Lightweight Micro-interactions) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden" id="particles-container"></div>
</main>
<!-- Footer Stats (Flavor Text) -->
<footer class="p-6 flex justify-between items-center relative z-10">
<div class="flex gap-6">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary-fixed animate-pulse"></div>
<span class="font-code-sm text-code-sm text-on-surface-variant">NODE: US-EAST-1</span>
</div>
<div class="hidden md:flex items-center gap-2">
<span class="font-code-sm text-code-sm text-outline">ENCRYPTION: AES-256</span>
</div>
</div>
<div class="text-outline font-code-sm text-code-sm">
            v2.4.0-STABLE
        </div>
</footer>
<script>
        // Micro-interaction: Particle Background
        const container = document.getElementById('particles-container');
        const particleCount = 12;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'absolute bg-primary-fixed opacity-20';
            
            // Random sizes (small code-like blocks)
            const sizeW = Math.random() * 40 + 10;
            const sizeH = 2;
            particle.style.width = `${sizeW}px`;
            particle.style.height = `${sizeH}px`;
            
            // Random positions
            particle.style.top = `${Math.random() * 100}%`;
            particle.style.left = `${Math.random() * 100}%`;
            
            // Animation
            const duration = Math.random() * 10 + 10;
            const delay = Math.random() * 5;
            particle.style.animation = `float ${duration}s linear ${delay}s infinite`;
            
            container.appendChild(particle);
        }

        // Add custom floating animation to the head
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0; }
                10% { opacity: 0.2; }
                90% { opacity: 0.2; }
                100% { transform: translateX(200px) translateY(-100px) rotate(45deg); opacity: 0; }
            }
            @keyframes scan {
                0% { top: 0; opacity: 0; }
                5% { opacity: 1; }
                95% { opacity: 1; }
                100% { top: 100%; opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body></html>
